name: Build and Release Windows App

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build Installer
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Add NSIS to PATH
        run: |
          echo "C:\Program Files (x86)\NSIS" >> $env:GITHUB_PATH
        shell: pwsh

      - name: Install dependencies
        run: |
          uv pip install --system -e .
          uv pip install --system nuitka ordered-set zstandard

      - name: Cache Nuitka
        uses: actions/cache@v4
        with:
          path: |
            ~/AppData/Local/Nuitka/Nuitka
          key: ${{ runner.os }}-nuitka-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-nuitka-

      - name: Build Standalone Installer
        run: |
          python build_nuitka.py --mode standalone
        shell: pwsh

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhoneMic-Installer
          path: dist/PhoneMic_Setup_*.exe
          if-no-files-found: error
          retention-days: 7

      # 仅在打了版本 tag (例如 v0.1.1) 时，自动创建 GitHub Release 并上传安装包
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PhoneMic_Setup_*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
